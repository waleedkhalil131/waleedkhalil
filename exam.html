<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إختبار البرمجة - مستر وليد خليل</title>
    <style>
        :root {
            --primary-blue: #1a73e8;
            --bg-body: #f1f3f4;
            --gold: #d4af37;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--primary-blue);
            color: white;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
        }

        .question-fixed-panel {
            flex: 0.6; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .question-section {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .question-title {
            background: var(--primary-blue);
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .result-display {
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .result-inner {
            border: 2px dashed var(--primary-blue);
            padding: 15px 25px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #222;
            border-radius: 10px;
            background: #fdfdfd;
            width: 90%;
            white-space: pre-wrap;
        }

        .options-scroll-panel {
            flex: 1.4; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-left: 10px;
        }

        .option-card {
            background: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            cursor: pointer;
            direction: ltr;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap; 
            word-break: break-all;
            transition: 0.2s;
        }

        .option-card:hover { border-color: var(--primary-blue); }

        .option-card.selected { 
            border: 4px solid var(--primary-blue); 
            background: #f0f7ff;
        }

        .q-number {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--primary-blue);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
        }

        .footer {
            height: 70px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
        }

       #nextBtn {
    display: none; /* هيفضل مخفي ويظهر بالجافا سكريبت */
    background-color: #28a745 !important;
    color: white !important;
    padding: 10px 30px !important;
    border-radius: 8px !important;
    border: none !important;
    cursor: pointer !important;
    font-weight: bold !important;
    font-size: 1.1rem !important;
    /* تأكد إنه مش fixed عشان يظهر في مكانه الجديد */
    position: static !important; 
}
        /* تنسيق الشهادة بالكامل */
.certificate {
    background: #ffffff;
    border: 8px double #007bff; /* برواز شيك مزدوج */
    box-shadow: 0 0 25px rgba(0, 0, 0, 0.2); /* ظل عشان الشهادة تبرز */
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    position: relative;
    max-width: 90%;
    margin: auto;
    border: 10px double #007bff; /* برواز أزرق مزدوج فخم */
    padding: 50px; /* مساحة داخلية أكبر عشان الكلام يتنفس */
    background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), 
                      url('https://www.transparenttextures.com/patterns/white-paper.png'); /* ملمس ورقي خفيف */
    box-shadow: 0 0 30px rgba(0,0,0,0.1); /* ظل خفيف خلف الشهادة */
}

/* تنسيق اسم الطالب */
#studentNameDisplay {
    display: block;
    font-size: 2.2rem; /* صغرنا الخط سنة عشان يشيل الاسم كامل */
    color: #2c3e50;
    margin: 15px 0;
    font-weight: bold;
    white-space: nowrap; /* السطر ده بيمنع الاسم إنه ينزل تحت بعضه */
    overflow: hidden;    /* عشان لو الاسم طويل جداً ميبوظش الشهادة */
    text-overflow: ellipsis; /* بيحط نقط لو الاسم خرج بره الإطار */
    border-bottom: 2px solid #333;
    padding-bottom: 5px;
    width: 100%; /* عشان يضمن إنه واخد عرض الشهادة كله */
}/* تنسيق الدرجة */
#certScore {
    color: #e74c3c;
    font-size: 1.5rem;
    font-weight: bold;
    background: #fdf2f2;
    padding: 5px 15px;
    border-radius: 8px;
    border: 1px solid #ffcccc;
}


/* حركة ظهور الشهادة (Animation) */
#certificateOverlay {
    display: none; /* بتظهر بالجافا سكريبت */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.4s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

        .options-scroll-panel::-webkit-scrollbar { width: 6px; }
        .options-scroll-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        @media (max-width: 768px) {
    .main-layout {
        flex-direction: column; /* يجعل السؤال والاختيارات تحت بعض */
        overflow-y: auto;
    }
    .question-fixed-panel, .options-scroll-panel {
        flex: none; /* يلغي التقسيم المئوي القديم */
        width: 100%;
    }
    .option-card {
        font-size: 0.60rem; /* تصغير الخط قليلاً ليتناسب مع الموبايل */
        padding: 15px;
    }
}
/* تنسيق خاص بالموبايل فقط */
@media (max-width: 600px) {
    .main-layout {
        flex-direction: column; /* يخلي السؤال والاختيارات تحت بعض */
        overflow-y: auto; /* يسمح بالسكرول للصفحة كلها */
    }

    .question-fixed-panel {
        flex: none;
        width: 100%;
        order: 1; /* السؤال يظهر الأول فوق */
    }

    .options-scroll-panel {
        flex: none;
        width: 100%;
        order: 2; /* الاختيارات تظهر تحت السؤال */
        height: auto;
        overflow-y: visible;
    }

    .result-inner {
        font-size: 1.1rem; /* تصغير الخط شوية عشان ميهزرش من الحاوية */
        padding: 10px;
    }

    .option-card {
        font-size: 0.85rem;
        padding: 15px;
    }
}

    let current = 0;
    let score = 0;
    let selectedIdx = null;

    function load() {
        const q = questions[current];
        document.getElementById('targetText').innerText = q.target;
        document.getElementById('qIdxDisp').innerText = current + 1;
        document.getElementById('nextBtn').style.visibility = 'hidden';
        
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerHTML = `<div class="q-number">${i+1}</div>${opt}`;
            card.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedIdx = i;
                document.getElementById('nextBtn').style.visibility = 'visible';
            };
            container.appendChild(card);
        });
        container.scrollTop = 0;
    }

    function handleNext() {
        if(selectedIdx === questions[current].answer) score++;
        if(current < questions.length - 1) {
            current++;
            selectedIdx = null;
            load();
       } else {
    // إرسال الرقم الصافي فقط للـ span اللي عملناه

// ضيف الدالة الجديدة هنا في السطر 370
function startStudentExam() {
    const sName = document.getElementById('student-name').value.trim();
    const sId = document.getElementById('student-id').value.trim();

    if (sName.length < 10) {
        alert("يرجى كتابة الاسم الثلاثى بشكل صحيح يا بطل!");
        return;
    }
    if (sId === "") {
        alert("يرجى إدخال رقم التليفون");
        return;
    }
    // السطر الجديد اللي هيظهر الزرار أول ما الامتحان يبدأ
    document.getElementById('nextBtn').style.display = 'block';

    document.getElementById('login-screen').style.display = 'none';
    localStorage.setItem('currentStudent', sName);
    
    load(); // دي اللي هتشغل الامتحان فعلياً بعد ما الطالب يدوس على الزرار
}
// تحديد الوقت بالدقائق
let timeInMinutes = 40; 
let currentTime = timeInMinutes * 60;

const timerElement = document.getElementById('timer');

function updateTimer() {
    const minutes = Math.floor(currentTime / 60);
    let seconds = currentTime % 60;
    
    // إضافة صفر لو الثواني أقل من 10
    seconds = seconds < 10 ? '0' + seconds : seconds;

    timerElement.innerHTML = `${minutes}:${seconds}`;

    if (currentTime > 0) {
        currentTime--;
    } else {
        alert("انتهى وقت الاختبار!");
        // هنا ممكن تضيف كود ينهي الامتحان تلقائياً
    }
}

// تشغيل الدالة كل ثانية
setInterval(updateTimer, 1000);
