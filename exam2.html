    { q: "من شروط الخوارزمية الجيدة أن تكون:", o: ["معقدة", "غير قابلة للتنفيذ", "لها بداية ونهاية", "طويلة جداً"], a: 2 },
    { q: "الخوارزمية يمكن تمثيلها باستخدام:", o: ["الخرائط الانسيابية", "لوحة المفاتيح", "الفأرة", "الشاشة"], a: 0 },
    { q: "ما المقصود بالبرمجة؟", o: ["استخدام الحاسوب", "كتابة أوامر بلغة يفهمها الكمبيوتر", "تشغيل البرامج", "تصفح الإنترنت"], a: 1 },
    { q: "البرنامج هو:", o: ["جهاز إلكتروني", "مجموعة أوامر تنفذ مهمة محددة", "ملف صور", "قاعدة بيانات"], a: 1 },
    { q: "لغة البرمجة هي:", o: ["لغة البشر", "وسيلة تواصل بين المستخدم والكمبيوتر", "مجموعة قواعد لكتابة أوامر الحاسوب", "نظام تشغيل"], a: 2 },
    { q: "أي مما يلي يعد مثالاً على لغة البرمجة؟", o: ["Windows", "Google", "Python", "Excel"], a: 2 }
];
    let currentQ = 0;
    let score = 0;
    const labels = ['أ', 'ب', 'ج', 'د'];

    function render() {
        const q = questions[currentQ];
        document.getElementById('q-txt').innerText = `سؤال ${currentQ + 1}: ${q.q}`;
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.setAttribute('data-label', labels[i]);
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === q.a) score++;
                next();
            };
            grid.appendChild(btn);
        });

        document.getElementById('bar').style.width = ((currentQ / questions.length) * 100) + '%';
    }

    function next() {
        currentQ++;
        if(currentQ < questions.length) render();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-wrapper').style.display = 'none';
        const cert = document.getElementById('certificate');
        cert.style.display = 'block';
        document.getElementById('score-val').innerText = `${score} / ${questions.length}`;
    }

    render();
</script>

</body>
