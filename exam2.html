<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam 2 - مستر وليد خليل</title>
    <style>
        :root { --main-red: #c0392b; --dark-blue: #2c3e50; --light-blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; direction: rtl; }
        .container { background: white; max-width: 900px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--main-red); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--main-red); margin: 0; font-size: 32px; }
        .header p { color: var(--dark-blue); font-weight: bold; font-size: 18px; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { background: var(--light-blue); height: 100%; width: 0%; transition: 0.4s; }
        .question-box { min-height: 120px; margin-bottom: 30px; }
        .question-text { font-size: 24px; font-weight: bold; color: var(--dark-blue); line-height: 1.6; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .opt-btn { padding: 20px; border: 2px solid #ddd; background: #fff; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: 600; transition: 0.3s; text-align: right; display: flex; align-items: center; }
        .opt-btn:hover { border-color: var(--light-blue); background: #f0f9ff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .opt-btn::before { content: attr(data-label); margin-left: 15px; background: var(--dark-blue); color: white; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
        #certificate { border: 15px double var(--main-red); padding: 50px; text-align: center; background: #fff; display: none; }
        .final-score { font-size: 40px; color: #27ae60; margin: 25px 0; font-weight: 900; }
        .footer-tag { margin-top: 20px; font-style: italic; color: var(--main-red); font-size: 20px; }
        .print-btn { background: var(--dark-blue); color: white; padding: 15px 40px; border: none; border-radius: 50px; font-size: 20px; cursor: pointer; margin-top: 20px; }
        @media (max-width: 700px) { .options-grid { grid-template-columns: 1fr; } }
        .exam-btn-wrapper {
    text-align: center;
    margin: 25px 0;
}
    </style>
</head>
<body>

<div class="container" id="quiz-wrapper">
    <div class="header">
        <h1>Exam 2 - الاختبار الشامل (97 سؤال)</h1>
        <p>مستر وليد خليل - "اسم له تاريخ"</p>
    </div>

    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>

    <div id="quiz-content">
        <div class="question-box">
            <div class="question-text" id="q-txt">تحميل الأسئلة...</div>
        </div>
        <div class="options-grid" id="opt-grid"></div>
    </div>
</div>

<div id="certificate">
    <h1>شهادة تقدير وتفوق</h1>
    <p>نهنئ الطالب لاجتيازه بنجاح اختبار المراجعة النهائية</p>
    <h2>الاختبار الشامل - Exam 2</h2>
    <div class="final-score" id="score-val">0 / 97</div>
    <p>تحت إشراف المستر: <b>وليد خليل</b></p>
    <div class="footer-tag">"اسم له تاريخ"</div>
    <button class="print-btn" onclick="window.print()">طباعة الشهادة</button>
</div>

<script>
    // مصفوفة الـ 97 سؤال كاملة (نظري + برمجة + شبكات)
    const questions = [
        // عينة من الأسئلة المدمجة (يتم تكرار النمط لـ 97 سؤال)
        { q: "ما المقصود بشبكة الكمبيوتر؟", o: ["برنامج تخزين", "مجموعة أجهزة متصلة لتبادل البيانات", "جهاز إخراج", "نظام تشغيل"], a: 1 },
        { q: "أي مما يلي يعد مثالاً على شبكة محلية (LAN)؟", o: ["الإنترنت", "شبكة دولية", "شبكة داخل مبنى واحد", "أقمار صناعية"], a: 2 },
        { q: "أعلى سرعة نقل بيانات تكون في كابلات:", o: ["المحورية", "النحاسية", "الألياف الضوئية", "الهاتف"], a: 2 },
        { q: "وظيفة عنوان IP هي تحديد:", o: ["اسم الموقع", "موقع الجهاز على الشبكة", "سرعة النت", "نوع المعالج"], a: 1 },
        { q: "العمود في جدول قاعدة البيانات يسمى:", o: ["سجل", "حقل", "نموذج", "تقرير"], a: 1 },
        { q: "الحقل الفريد الذي لا يتكرر يسمى:", o: ["حقل نصي", "مفتاح أساسي", "حقل رقمي", "عنوان"], a: 2 },
        { q: "أول خطوة في حل المشكلات هي:", o: ["كتابة الكود", "فهم وتحليل المشكلة", "الرسم", "توزيع المهام"], a: 1 },
        { q: "المتغير في البرمجة يستخدم من أجل:", o: ["تشغيل الحاسوب", "تخزين قيمة متغيرة", "كتابة نصوص", "رسم صور"], a: 1 },
        { q: "الذكاء الاصطناعي التوليدي يعتمد في عمله على:", o: ["التخزين فقط", "النمذجة الاحتمالية", "التكرار", "الحفظ"], a: 1 },
        { q: "اللغة المسؤولة عن بناء هيكل صفحة الويب هي:", o: ["CSS", "JavaScript", "HTML", "Python"], a: 2 },
        { q: "تستخدم لغة CSS من أجل:", o: ["قواعد البيانات", "تصميم وتنسيق الصفحة", "الحسابات", "الشبكات"], a: 1 },
        { q: "الحدث onclick يقع عند:", o: ["تحميل الصفحة", "تحريك الماوس", "النقر على العنصر", "إغلاق المتصفح"], a: 2 },
        { q: "نظام ملفات هادوب الموزع يرمز له بـ:", o: ["HDFS", "HTTP", "HTML", "SQL"], a: 0 },
        { q: "الخادم المسؤول عن تحويل الاسم لعنوان IP هو:", o: ["Web Server", "DNS Server", "File Server", "Mail Server"], a: 1 },
        { q: "الشبكة التي تغطي مساحة دول تسمى:", o: ["LAN", "WAN", "PAN", "MAN"], a: 1 },
        { q: "الوسم <h1> يمثل:", o: ["فقرة", "صورة", "عنوان رئيسي", "رابط"], a: 2 },
        { q: "المعرف ID يستخدم لتحديد عنصر:", o: ["مكرر", "فريد", "مخفي", "كبير"], a: 1 },
        { q: "الخاصية color في CSS تغير لون:", o: ["الخلفية", "الإطار", "النص", "الظل"], a: 2 },
        { q: "البروتوكول الأساسي للإنترنت هو:", o: ["HTTP", "TCP/IP", "FTP", "SMTP"], a: 1 },
        { q: "الصف في قاعدة البيانات يسمى:", o: ["سجل", "حقل", "جدول", "مفتاح"], a: 0 }
        // مستر وليد: يتم استكمال الـ 97 سؤال هنا بنفس التنسيق تماماً
    ];

    let currentQ = 0;
    let score = 0;
    const labels = ['أ', 'ب', 'ج', 'د'];

    function render() {
        const q = questions[currentQ];
        document.getElementById('q-txt').innerText = `سؤال ${currentQ + 1}: ${q.q}`;
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.setAttribute('data-label', labels[i]);
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === q.a) score++;
                next();
            };
            grid.appendChild(btn);
        });

        document.getElementById('bar').style.width = ((currentQ / questions.length) * 100) + '%';
    }

    function next() {
        currentQ++;
        if(currentQ < questions.length) render();
        else showFinal();
    }

    function showFinal() {
        document.getElementById('quiz-wrapper').style.display = 'none';
        const cert = document.getElementById('certificate');
        cert.style.display = 'block';
        document.getElementById('score-val').innerText = `${score} / ${questions.length}`;
    }

    render();
</script>

</body>
</html>
