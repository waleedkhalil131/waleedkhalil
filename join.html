<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعم منصة كيريو | مستر وليد خليل</title>
    <style>
        /* التنسيق العام المستوحى من صورتك */
        body {
            background-color: #000; /* خلفية سوداء تماماً */
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .registration-card {
            background: #000;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #bc13fe; /* البرواز البنفسجي من الصورة */
            box-shadow: 0 0 30px #bc13fe; /* توهج النيون */
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        /* تنسيق النصوص */
        h2 { 
            color: #00f3ff; 
            text-shadow: 0 0 15px #00f3ff; 
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* تنسيق خانات الإدخال */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            text-align: right;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* زرار الإرسال الاحترافي */
        .cyber-btn {
            background: transparent;
            color: #bc13fe;
            border: 2px solid #bc13fe;
            padding: 12px 0;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            width: 100%;
            border-radius: 5px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .cyber-btn:hover {
            background: #bc13fe;
            color: #fff;
            box-shadow: 0 0 20px #bc13fe;
        }

        /* رسالة النجاح */
        #msg {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            font-weight: bold;
            display: none;
            border: 1px solid #00f3ff;
        }
    </style>
</head>
<body>

<div class="registration-card">
    <div style="font-size: 40px; margin-bottom: 10px;">🚀</div>
    <h2>دعم منصة كيريو</h2>
    <h3>تصميم - مستر وليد</h3>
    <p>بيانات الطلاب الذين لم يستطيعوا تسجيل الدخول</p>
    
    <form id="support-form">
        <input type="text" id="name" name="name" placeholder="الاسم بالكامل" required>
        <input type="text" id="studentID" name="studentID" placeholder="الـ (ID) " required>
        <button type="submit" id="submitBtn" class="cyber-btn">تأكيد الإرسال للمراجعة</button>
    </form>
    
    <div id="msg">تم استلام بياناتك بنجاح! جاري حل مشكلتك ✅</div>
</div>

<script>
    // رابط الـ Script اللي عملناه في Google Sheets
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxTpTffjbMyjRn9MXfw4gQi1WNYqfGpPs_Vk5s58vsQDmNRvDmc3L_ss4bSQi4-9i5dPw/exec'; 
    const form = document.getElementById('support-form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.style.display = 'block';
                btn.style.display = 'none';
                form.reset();
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("حدث خطأ في الإرسال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerText = "تأكيد الإرسال للمراجعة";
            });
    });
</script>

</body>
</html>
