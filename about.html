<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عن المستر | وليد خليل</title>
    <style>
        /* --- كود الاستايل (البروباجندا والنيون) --- */
        body {
            background-color: #0a0b10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; direction: rtl; overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* زر العودة */
        .back-btn {
            text-decoration: none; color: #00f3ff; border: 2px solid #00f3ff;
            padding: 8px 20px; border-radius: 20px; display: inline-block; margin-bottom: 20px;
        }

        /* الهيدر التعريفي */
        .hero-section {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            gap: 30px; background: rgba(255, 255, 255, 0.02); padding: 20px;
            border-radius: 15px; border: 1px solid #00f3ff;
        }

        .hero-content { flex: 1; min-width: 300px; }
        
        /* ضبط حجم صورة القهوة / البروفايل الشخصي */
        .main-img-neon {
            width: 250px !important; height: 250px !important;
            object-fit: cover; border-radius: 15px; border: 2px solid #00f3ff;
        }

        .neon-text { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; font-size: 1.8rem; margin: 0; }
        .history-tag { color: #ffcf00; font-weight: bold; margin-bottom: 10px; }

        /* معرض الـ 8 صور (لقطات الحصص) */
        .image-gallery-8 {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; margin: 30px 0;
        }

        .image-gallery-8 img {
            width: 100%; height: 160px; object-fit: cover;
            border-radius: 10px; border: 1px solid #00f3ff; transition: 0.3s;
        }

        /* سكرينات الواتساب (الـ 5 آراء) */
        .reviews-whatsapp-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
        }

        .reviews-whatsapp-grid img {
            width: 180px; height: auto; border-radius: 12px; border: 2px solid #25d366;
        }

        .section-title { color: #ffcf00; text-align: center; margin: 40px 0 20px; border-bottom: 2px solid #00f3ff; padding-bottom: 10px; }

        /* ضبط الفيديو */
        .video-container { width: 100%; max-width: 600px; margin: 20px auto; border: 2px solid #00f3ff; border-radius: 10px; overflow: hidden; }

        @media (max-width: 600px) { .hero-section { flex-direction: column-reverse; text-align: center; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">🏠 العودة للرئيسية</a>

    <header class="hero-section">
        <div class="hero-content">
            <h1 class="neon-text">المستر وليد خليل</h1>
            <p class="history-tag">اسم له تاريخ في عالم التكنولوجيا</p>
            <p>🏅 خبرة أكثر من 24 عاماً منذ 2002.</p>
            <p>🤖 متخصص في (Java, JavaScript) والذكاء الاصطناعي.</p>
            <p>🏛️ مدرسة بورسعيد العسكرية.</p>
        </div>
        <img src="waleed.jpg" class="main-img-neon">
    </header>

    <h2 class="section-title">📽️ الفيديو التعريفي</h2>
    <div class="video-container">
        <iframe width="100%" height="315" src="video.mp4" frameborder="0" allowfullscreen></iframe>
    </div>

    <h2 class="section-title">📸 لقطات من داخل الحصص </h2>
    <div class="image-gallery-8">
        <img src="a1.jfif"> <img src="a2.jfif"> <img src="a3.jfif"> <img src="a4.jfif">
        <img src="a5.jfif"> <img src="a6.jfif"> <img src="a7.jfif"> <img src="a8.jfif">
    </div>

    <h2 class="section-title">💬 ثقة وآراء طلابنا </h2>
    <div class="reviews-whatsapp-grid">
        <img src="b1.jfif"> <img src="b2.jfif"> <img src="b3.jfif"> 
        <img src="b4.jfif"> <img src="b5.jfif">
    </div>
</div>

</body>
</html>
